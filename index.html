<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Incitetales — The Untold Assam</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,600&family=DM+Mono:wght@300;400;500&family=Lora:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:         #ffffff;
  --bg2:        #fffdf5;
  --bg3:        #fdf8e8;
  --ink:        #1c1814;
  --ink2:       #3a342c;
  --ink3:       #6a6058;
  --terra:      #8b4a2a;
  --terra-dim:  #b87a58;
  --terra-pale: #fff8e8;
  --forest:     #2a5c48;
  --forest-dim: #4a8c70;
  --forest-pale:#d8ede5;
  --yellow:     #f5c842;
  --yellow-dim: #f5e090;
  --yellow-pale:#fffbe8;
  --border:     #ede8d8;
  --border2:    #e0d8c4;
  --cream:      #ffffff;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Lora', Georgia, serif;
  font-size: 16px;
  line-height: 1.7;
  overflow-x: hidden;
}

/* subtle paper texture */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 300 300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
  opacity: 0.5;
}

/* ── NAV ── */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 48px;
  background: rgba(255,255,255,0.97);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(8px);
}

.nav-logo {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--ink);
  text-decoration: none;
  letter-spacing: 0.01em;
}
.nav-logo span { color: var(--ink); background: var(--yellow); padding: 0 4px; }

.nav-links {
  display: flex;
  gap: 28px;
  list-style: none;
}
.nav-links a {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink3);
  text-decoration: none;
  transition: color 0.2s;
}
.nav-links a:hover { color: var(--terra); }

.nav-cta {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--cream);
  background: var(--ink);
  padding: 9px 18px;
  text-decoration: none;
  transition: background 0.2s;
}
.nav-cta:hover { background: var(--terra); }

/* ── HERO ── */
.hero {
  min-height: 100vh;
  padding: 120px 48px 80px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 64px;
  align-items: center;
  position: relative;
  border-bottom: 1px solid var(--border);
}

/* Decorative vertical line */
.hero::before {
  content: '';
  position: absolute;
  top: 120px; bottom: 80px;
  left: 50%;
  width: 1px;
  background: linear-gradient(180deg, transparent, var(--border2), transparent);
}

.hero-left {}

.hero-issue {
  font-family: 'DM Mono', monospace;
  font-size: 8.5px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--ink2);
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.hero-issue::before {
  content: '';
  width: 24px;
  height: 3px;
  background: var(--yellow);
}

.hero-headline {
  font-family: 'Playfair Display', serif;
  font-size: clamp(48px, 5.5vw, 80px);
  font-weight: 400;
  line-height: 1.05;
  color: var(--ink);
  letter-spacing: -0.02em;
  margin-bottom: 28px;
}
.hero-headline em {
  font-style: italic;
  color: var(--terra);
}

.hero-body {
  font-size: 16px;
  color: var(--ink2);
  line-height: 1.75;
  max-width: 420px;
  margin-bottom: 36px;
}

.hero-actions {
  display: flex;
  gap: 20px;
  align-items: center;
}

.btn-primary {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--cream);
  background: var(--ink);
  padding: 12px 24px;
  text-decoration: none;
  transition: background 0.2s;
  display: inline-block;
}
.btn-primary:hover { background: var(--terra); }

.btn-ghost {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink3);
  text-decoration: none;
  border-bottom: 1px solid var(--border2);
  padding-bottom: 2px;
  transition: color 0.2s, border-color 0.2s;
}
.btn-ghost:hover { color: var(--terra); border-color: var(--terra-dim); }

/* Hero right — featured story */
.hero-right {
  position: relative;
}

.hero-featured {
  background: var(--bg2);
  border: 1px solid var(--border);
  overflow: hidden;
  position: relative;
}

.hero-featured-img {
  height: 340px;
  background: linear-gradient(160deg, #1a2e20 0%, #1e3828 50%, #0e1e14 100%);
  position: relative;
  overflow: hidden;
}

.hero-featured-img::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 30% 70%, rgba(42,92,72,0.3) 0%, transparent 60%),
    linear-gradient(180deg, transparent 40%, rgba(28,24,20,0.6) 100%);
}

.hero-featured-label {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 20px 24px;
  z-index: 2;
}

.featured-region {
  font-family: 'DM Mono', monospace;
  font-size: 8px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: rgba(245,240,232,0.7);
  margin-bottom: 6px;
}

.featured-title {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 600;
  color: var(--bg);
  line-height: 1.2;
}

.hero-featured-body {
  padding: 20px 24px;
  border-top: 1px solid var(--border);
}

.hero-featured-excerpt {
  font-size: 13px;
  color: var(--ink2);
  line-height: 1.6;
  margin-bottom: 14px;
  font-style: italic;
}

.hero-featured-link {
  font-family: 'DM Mono', monospace;
  font-size: 8.5px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--terra);
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: gap 0.2s;
}
.hero-featured-link:hover { gap: 12px; }
.hero-featured-link::after { content: '→'; }

/* ── TICKER ── */
.ticker {
  background: var(--ink);
  padding: 11px 0;
  overflow: hidden;
  white-space: nowrap;
}
.ticker-inner {
  display: inline-flex;
  animation: ticker 35s linear infinite;
}
.ticker-item {
  font-family: 'DM Mono', monospace;
  font-size: 8.5px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(245,240,232,0.5);
  padding: 0 28px;
  border-right: 1px solid rgba(245,240,232,0.1);
}
.ticker-item span { color: var(--yellow); margin-right: 8px; }

/* ── SECTION COMMON ── */
.section-wrap {
  padding: 80px 48px;
  position: relative;
}

.section-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-bottom: 48px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}

.section-label {
  font-family: 'DM Mono', monospace;
  font-size: 8.5px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--ink2);
  margin-bottom: 8px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.section-label::before {
  content: '';
  width: 16px;
  height: 3px;
  background: var(--yellow);
  display: inline-block;
}

.section-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(28px, 3vw, 40px);
  font-weight: 400;
  color: var(--ink);
  line-height: 1.15;
}
.section-title em { font-style: italic; color: var(--terra); }

/* ── STORIES ── */
.stories-section { background: #fff; border-top: 1px solid var(--border); }

.stories-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
}

.story-card {
  background: #fafaf8;
  overflow: hidden;
  cursor: pointer;
  transition: background 0.3s;
}
.story-card:hover { background: #f5f3ee; }

.story-card-img {
  height: 200px;
  position: relative;
  overflow: hidden;
}

.story-card-img-bg {
  position: absolute;
  inset: 0;
  transition: transform 0.5s ease;
}
.story-card:hover .story-card-img-bg { transform: scale(1.04); }

.story-card:nth-child(1) .story-card-img-bg {
  background: linear-gradient(160deg, #1a2e20 0%, #1e3828 50%, #0e1e14 100%);
}
.story-card:nth-child(2) .story-card-img-bg {
  background: linear-gradient(160deg, #2a1e10 0%, #3a2a14 50%, #1a1008 100%);
}
.story-card:nth-child(3) .story-card-img-bg {
  background: linear-gradient(160deg, #1a1e2e 0%, #1e2438 50%, #0e1020 100%);
}

.story-card-img-bg::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, transparent 40%, rgba(28,24,20,0.5) 100%);
}

.story-card-body {
  padding: 20px;
  border-top: 1px solid var(--border);
}

.story-card-region {
  font-family: 'DM Mono', monospace;
  font-size: 8px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--terra);
  margin-bottom: 8px;
}

.story-card-title {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  font-weight: 600;
  color: var(--ink);
  line-height: 1.25;
  margin-bottom: 10px;
}

.story-card-excerpt {
  font-size: 13px;
  color: var(--ink3);
  line-height: 1.55;
  margin-bottom: 14px;
  font-style: italic;
}

.story-card-link {
  font-family: 'DM Mono', monospace;
  font-size: 8px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--terra);
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: gap 0.2s;
}
.story-card-link:hover { gap: 10px; }
.story-card-link::after { content: '→'; }

/* ── MANIFESTO ── */
.manifesto {
  background: var(--ink);
  padding: 72px 48px;
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 80px;
  align-items: center;
}

.manifesto-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--yellow);
}

.manifesto-text {
  font-family: 'Playfair Display', serif;
  font-size: clamp(22px, 2.5vw, 32px);
  font-weight: 400;
  font-style: italic;
  color: var(--bg);
  line-height: 1.5;
}
.manifesto-text strong {
  font-style: normal;
  font-weight: 700;
  color: var(--terra-dim);
}

/* ── ITINERARY BUILDER ── */
.builder-section {
  background: var(--forest);
  padding: 80px 48px;
}

.builder-inner {
  display: grid;
  grid-template-columns: 1fr 1.4fr;
  gap: 80px;
  align-items: start;
}

.builder-left {}

.builder-label {
  font-family: 'DM Mono', monospace;
  font-size: 8.5px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: rgba(245,240,232,0.6);
  margin-bottom: 16px;
}

.builder-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(28px, 3vw, 42px);
  font-weight: 400;
  color: var(--bg);
  line-height: 1.15;
  margin-bottom: 20px;
}
.builder-title em { font-style: italic; }

.builder-desc {
  font-size: 14px;
  color: rgba(245,240,232,0.7);
  line-height: 1.7;
  margin-bottom: 28px;
}

.builder-destinations {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.dest-pill {
  font-family: 'DM Mono', monospace;
  font-size: 8px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(245,240,232,0.7);
  border: 1px solid rgba(245,240,232,0.2);
  padding: 4px 10px;
}

/* Builder form */
.builder-form {
  background: var(--cream);
  border: 1px solid var(--border);
  padding: 32px;
}

.builder-form-title {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.form-group {
  margin-bottom: 18px;
}

.form-label {
  font-family: 'DM Mono', monospace;
  font-size: 8px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink3);
  display: block;
  margin-bottom: 6px;
}

.form-select, .form-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border2);
  padding: 10px 14px;
  font-family: 'Lora', serif;
  font-size: 13px;
  color: var(--ink);
  outline: none;
  transition: border-color 0.2s;
  appearance: none;
}
.form-select:focus, .form-input:focus { border-color: var(--forest); }

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.form-submit {
  width: 100%;
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--cream);
  background: var(--ink);
  border: none;
  padding: 14px;
  cursor: pointer;
  transition: background 0.2s;
  margin-top: 8px;
}
.form-submit:hover { background: var(--terra); }

.form-note {
  font-family: 'DM Mono', monospace;
  font-size: 8px;
  letter-spacing: 0.1em;
  color: var(--ink3);
  text-align: center;
  margin-top: 10px;
  line-height: 1.5;
}

/* ── NEWSLETTER ── */
.newsletter {
  background: var(--ink);
  padding: 80px 48px;
  text-align: center;
}

.newsletter-label {
  font-family: 'DM Mono', monospace;
  font-size: 8.5px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--terra-dim);
  margin-bottom: 20px;
}

.newsletter-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(32px, 4vw, 52px);
  font-weight: 400;
  font-style: italic;
  color: var(--bg);
  line-height: 1.2;
  margin-bottom: 14px;
}
.newsletter-title strong {
  font-style: normal;
  font-weight: 700;
}

.newsletter-sub {
  font-size: 14px;
  color: rgba(245,240,232,0.6);
  margin-bottom: 36px;
  max-width: 380px;
  margin-left: auto;
  margin-right: auto;
}

.newsletter-form {
  display: flex;
  max-width: 400px;
  margin: 0 auto;
}

.newsletter-input {
  flex: 1;
  background: rgba(245,240,232,0.08);
  border: 1px solid rgba(245,240,232,0.2);
  border-right: none;
  padding: 12px 16px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--bg);
  outline: none;
  transition: border-color 0.2s;
}
.newsletter-input::placeholder { color: rgba(245,240,232,0.3); }
.newsletter-input:focus { border-color: rgba(245,240,232,0.5); }

.newsletter-btn {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  background: var(--terra);
  color: var(--cream);
  border: none;
  padding: 12px 20px;
  cursor: pointer;
  transition: background 0.2s;
  white-space: nowrap;
}
.newsletter-btn:hover { background: var(--terra-dim); }

/* ── FOOTER ── */
<footer>
  <div class="footer-grid">
    <div>
      <div class="footer-logo">Incite<span>tales</span></div>
      <p class="footer-about">The untold stories of Northeast India. Curated trips built on personal experience. Illustrated prints from the field. Built in Guwahati.</p>
      <div class="footer-social">incitetales.com · @incitetales</div>
    </div>
    <div class="footer-col">
      <div class="footer-col-title">Stories</div>
      <ul>
        <li><a href="maguri-beel.html">Maguri Beel</a></li>
        <li><a href="#">Dibru-Saikhowa</a></li>
        <li><a href="#">Stilwell Road</a></li>
        <li><a href="#">Majuli Island</a></li>
        <li><a href="#stories">All Stories →</a></li>
      </ul>
    </div>
    <div class="footer-col">
      <div class="footer-col-title">Trips</div>
      <ul>
        <li><a href="discover-ne.html">Assam Immersion</a></li>
        <li><a href="discover-ne.html">Meghalaya Loop</a></li>
        <li><a href="discover-ne.html">Arunachal Tawang</a></li>
        <li><a href="explore-nearby.html">Darjeeling + Sikkim</a></li>
        <li><a href="#builder">Itinerary Builder</a></li>
      </ul>
    </div>
    <div class="footer-col">
      <div class="footer-col-title">About</div>
      <ul>
        <li><a href="#">Why Incitetales</a></li>
        <li><a href="#">For Operators</a></li>
        <li><a href="merch.html">Merch</a></li>
        <li><a href="mailto:hello@incitetales.com">hello@incitetales.com</a></li>
        <li><a href="#">Instagram</a></li>
      </ul>
    </div>
  </div>
  <div class="footer-bottom">
    <span class="footer-copy">© 2026 Incitetales · Guwahati, Assam</span>
    <span class="footer-tagline">"One story. Every week."</span>
  </div>
</footer>

<script>
// Scroll reveal
const observer = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      e.target.classList.add('visible');
      observer.unobserve(e.target);
    }
  });
}, { threshold: 0.06 });
document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

// Nav scroll
const nav = document.querySelector('nav');
window.addEventListener('scroll', () => {
  nav.style.boxShadow = window.scrollY > 40
    ? '0 2px 20px rgba(28,24,20,0.08)'
    : 'none';
});

// Itinerary builder
function generateItinerary() {
  const destination = document.getElementById('destination').value;
  const email = document.getElementById('email').value;
  if (!destination) { alert('Please select a destination.'); return; }
  if (!email || !email.includes('@')) { alert('Please enter a valid email.'); return; }
  const btn = document.querySelector('.form-submit');
  btn.textContent = 'Building your itinerary...';
  setTimeout(() => {
    alert('Thank you! We are building your custom itinerary and will send it to ' + email + ' shortly.');
    btn.textContent = 'Generate My Itinerary →';
  }, 1500);
}
</script>
</body>
